{% extends "base.html" %}
{% block title %}New Appointment{% endblock %}
{% block content %}
<div class="card p-4">
  <h3 class="mb-1">Request Appointment</h3>
  <div class="text-muted mb-3">Doctor: <strong>{{ profile.assigned_doctor }}</strong></div>

  <form method="post">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-4">
        <label class="form-label">Type</label>
        {{ form.type }}
      </div>
      <div class="col-md-4">
        <label class="form-label">Preferred time 1</label>
        {{ form.preferred_time_1 }}
      </div>
      <div class="col-md-4">
        <label class="form-label">Preferred time 2</label>
        {{ form.preferred_time_2 }}
      </div>
      <div class="col-12">
        <label class="form-label">Reason</label>
        {{ form.reason_text }}
      </div>
    </div>
    <div class="mt-3 d-flex gap-2">
      <button class="btn btn-primary" type="submit">Submit Request</button>
      <a class="btn btn-outline-secondary" href="/user/">Back</a>
    </div>
  </form>
</div>
{% endblock %}
