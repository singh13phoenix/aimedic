{% extends "base.html" %}
{% block title %}Refill Request{% endblock %}
{% block content %}
<div class="card p-4">
  <h3 class="mb-1">Refill Medicine Request</h3>
  <div class="text-muted mb-3">Doctor: <strong>{{ profile.assigned_doctor }}</strong></div>

  <form method="post">
    {% csrf_token %}
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Medicine name</label>
        {{ form.medication_name }}
      </div>
      <div class="col-md-3">
        <label class="form-label">Dosage</label>
        {{ form.dosage }}
      </div>
      <div class="col-md-3">
        <label class="form-label">Frequency</label>
        {{ form.frequency }}
      </div>
      <div class="col-12">
        <label class="form-label">Notes</label>
        {{ form.notes }}
      </div>
    </div>
    <div class="mt-3 d-flex gap-2">
      <button class="btn btn-dark" type="submit">Submit Refill Request</button>
      <a class="btn btn-outline-secondary" href="/user/">Back</a>
    </div>
  </form>
</div>
{% endblock %}
