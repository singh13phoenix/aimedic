<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% block title %}AImedic{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#f6f7fb;}
    .brand {font-weight:700; letter-spacing:.3px;}
    .card{border:0; box-shadow:0 10px 30px rgba(0,0,0,.06); border-radius:16px;}
    .btn{border-radius:12px;}
    .mic-btn{width:48px; height:48px; border-radius:50%;}
    .transcript{background:#fff; border-radius:12px; padding:12px; min-height:90px;}
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg bg-white border-bottom">
  <div class="container">
    <a class="navbar-brand brand" href="/">AImedic</a>
    <div class="ms-auto d-flex gap-2 align-items-center">
      {% if user.is_authenticated %}
        <a class="btn btn-outline-secondary btn-sm" href="/logout/">Logout</a>
        <a class="btn btn-primary btn-sm" href="{% if user.role == 'USER' %}/user/notifications/{% elif user.role == 'DOCTOR' %}/doctor/notifications/{% elif user.role == 'PHARMACY' %}/pharmacy/notifications/{% else %}/super/{% endif %}">
          Notifications {% if unread_notifications %}<span class="badge text-bg-light">{{ unread_notifications }}</span>{% endif %}
        </a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container py-4">
  {% if messages %}
    {% for m in messages %}
      <div class="alert alert-{{ m.tags }} alert-dismissible fade show" role="alert">
        {{ m }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
